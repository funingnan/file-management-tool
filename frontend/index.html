<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF 知识库</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <!-- 顶部工具栏 -->
    <header id="toolbar">
        <div class="toolbar-left">
            <button id="btn-scan" class="btn" style="width:95px;display:flex;align-items:center;justify-content:center;gap:4px"><img src="src/icons/scan.svg" style="width:16px;height:16px" /> 扫描文件</button>
            <button id="btn-select-folder" class="btn" style="width:95px;display:flex;align-items:center;justify-content:center;gap:4px"><img src="src/icons/folder-open.svg" style="width:16px;height:16px" /> 选择路径</button>
        </div>
        <div class="toolbar-center">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="搜索文件名或标签..." />
            </div>
            <span id="current-path" class="current-path" style="display:none"></span>
        </div>
        <div class="toolbar-right">
            <button id="btn-view-list" class="btn btn-icon active" data-tip="列表视图"><img src="src/icons/list.svg" style="width:16px;height:16px" /></button>
            <button id="btn-view-graph" class="btn btn-icon" data-tip="网络图谱">🕸️</button>
            <span id="doc-count" class="doc-count"></span>
        </div>
    </header>

    <div id="app-wrapper">
    <!-- 主内容区 -->
    <div id="main-content">
    <!-- 左侧面板 -->
    <aside id="tag-panel">
        <div class="panel-header">
            <h3>文件类型</h3>
        </div>
        <div id="file-type-filter">
            <!-- 动态生成 -->
        </div>
        <div class="panel-header tag-panel-header" style="border-top:1px solid var(--border)">
            <div style="display:flex;align-items:center;gap:12px">
                <h3>标签</h3>
                <button id="btn-tag-mode" class="btn btn-sm" title="切换标签匹配模式" style="min-width:56px">并集</button>
                <button id="btn-clear-filter" class="btn btn-sm" title="清除筛选" style="min-width:56px;visibility:hidden">✕ 清除</button>
            </div>
        </div>
        <div id="tag-list"></div>
        <div class="sidebar-footer">
            <button id="btn-settings" class="btn-settings-link"><span class="settings-icon"><svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 15.5A3.5 3.5 0 0 1 8.5 12 3.5 3.5 0 0 1 12 8.5a3.5 3.5 0 0 1 3.5 3.5 3.5 3.5 0 0 1-3.5 3.5m7.43-2.53c.04-.32.07-.64.07-.97 0-.33-.03-.66-.07-1l2.11-1.63c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.31-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.5.42l-.37 2.65c-.63.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64L4.57 11c-.04.34-.07.67-.07 1 0 .33.03.65.07.97l-2.11 1.66c-.19.15-.25.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1.01c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.25.42.5.42h4c.25 0 .46-.18.5-.42l.37-2.65c.63-.26 1.17-.59 1.69-.98l2.49 1.01c.22.08.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.66z"/></svg></span> 设置</button>
            <span class="version-label">v0.1.10</span>
        </div>
    </aside>

        <!-- 中间文件列表 -->
        <section id="file-panel" class="center-panel">
            <div id="file-list-header">
                <label id="select-all-wrap">
                    <input type="checkbox" id="select-all" /> 全选
                </label>
                <div id="batch-actions" style="visibility:visible">
                    <span id="selected-count">0 个已选</span>
                    <button id="btn-deselect-all" class="btn btn-sm">取消选择</button>
                    <button id="btn-batch-remove-docs" class="btn btn-sm btn-danger">移除文件</button>
                </div>
            </div>
            <div id="file-list"></div>
            <div id="empty-state" style="display:none">
                <p>📭</p>
                <p>还没有文件</p>
                <p>点击左上角「扫描文件夹」开始</p>
            </div>
        </section>

        <!-- 右侧详情面板 -->
        <aside id="detail-panel">
            <div id="detail-empty">
                <p>👈 选择一个文件查看详情</p>
            </div>
            <div id="detail-content" style="display:none">
                <h3 id="detail-filename"></h3>
                <p id="detail-path" class="detail-path"></p>
                <div class="detail-actions">
                    <button id="btn-open-file" class="btn btn-sm" style="width:80px"><img src="src/icons/doc-detail.svg" style="width:14px;height:14px;vertical-align:middle;margin-right:2px" /> 打开文件</button>
                    <button id="btn-open-dir" class="btn btn-sm" style="width:80px"><img src="src/icons/folder-open.svg" style="width:14px;height:14px;vertical-align:middle;margin-right:2px" /> 打开目录</button>
                    <button id="btn-remove-doc" class="btn btn-sm btn-danger" style="width:80px"><img src="src/icons/delete.svg" style="width:14px;height:14px;vertical-align:middle;margin-right:2px" /> 移除文件</button>
                </div>
                <div class="detail-section">
                    <h4>标签</h4>
                    <div id="detail-tags"></div>
                    <div class="tag-input-row">
                        <input type="text" id="tag-input" placeholder="输入新标签..." />
                    </div>
                    <div id="tag-autocomplete" class="autocomplete-list" style="display:none"></div>
                </div>
                <div class="detail-section">
                    <h4>可选标签 <span style="font-weight:normal;font-size:11px;color:#aaa">（点击添加）</span></h4>
                    <div id="available-tags"></div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 网络图谱视图 -->
    <div id="graph-view" style="display:none">
        <div id="graph-toolbar">
            <button id="btn-graph-doc" class="btn btn-sm active">PDF 关联网络</button>
            <button id="btn-graph-tag" class="btn btn-sm">标签关联网络</button>
            <input type="text" id="graph-search" placeholder="搜索节点..." />
        </div>
        <div id="graph-container"></div>
    </div>
    </div>

    <!-- 批量标签弹窗 -->
    <div id="modal-overlay" style="display:none">
        <div id="modal">
            <div id="modal-header">
                <h3 id="modal-title"></h3>
                <button id="btn-modal-close" class="btn btn-icon">✕</button>
            </div>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- ===== 标签选择器模式（右键菜单调用） ===== -->
    <div id="tag-picker-mode" style="display:none">
        <div class="tp-header">
            <div class="tp-file-info">
                <span class="tp-icon">🏷️</span>
                <div class="tp-file-text">
                    <span class="tp-label">添加标签</span>
                    <span id="tp-filename" class="tp-filename"></span>
                </div>
            </div>
            <button id="tp-btn-close" class="tp-close-btn" title="关闭">✕</button>
        </div>

        <div class="tp-search-wrap">
            <input type="text" id="tp-search" class="tp-search" placeholder="搜索已有标签或输入新标签..." autocomplete="off" />
        </div>

        <div id="tp-current-section" class="tp-section" style="display:none">
            <div class="tp-section-title">当前标签</div>
            <div id="tp-current-tags" class="tp-tag-grid"></div>
        </div>

        <div class="tp-section">
            <div class="tp-section-title">可用标签</div>
            <div id="tp-create-btn" class="tp-create-item" style="display:none">
                <span class="tp-create-icon">＋</span>
                <span id="tp-create-text"></span>
            </div>
            <div id="tp-tag-list" class="tp-tag-list"></div>
            <div id="tp-empty" class="tp-empty" style="display:none">暂无标签</div>
        </div>

        <div id="tp-toast" class="tp-toast" style="display:none"></div>
    </div>

    <!-- vis.js (本地) -->
    <script src="src/vis-network.min.js"></script>
    <script src="src/tauri-bridge.js"></script>
    <script src="src/main.js"></script>
</body>
</html>
